{
  "proxies": [
    {
      "name": "Safaricom",
      "type": "http",
      "server": "proxy.safaricom.co.ke",
      "port": 8080,
      "username": "user",
      "password": "pass"
    },
    {
      "name": "Airtel",
      "type": "http",
      "server": "proxy.airtel.co.ke",
      "port": 8080,
      "username": "user",
      "password": "pass"
    }
  ],
  "rules": [
    {
      "type": "domain",
      "value": "example.com",
      "proxy": "Safaricom"
    },
    {
      "type": "domain",
      "value": "example.org",
      "proxy": "Airtel"
    }
  ]
}
